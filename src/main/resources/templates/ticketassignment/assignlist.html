<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Ticket List</title>
</head>

<body>
<div layout:fragment="content">
    <!--<button hx-get="/user/new" hx-target="#userForm" hx-swap="innerHTML">New User</button>-->
	
    <table>
        <thead>
        <tr><th th:text = "${user.firstName + ', ' + user.lastName}" id = "rowHead">If you are seeing this something failed</th></tr>
        </thead>
        <tbody id="ticketRows" th:fragment="ticketRows">
            <tr th:each="ticket : ${tickets}" th:id="${'ticket-' + ticket.id}">
                <td th:text="${ticket.title}"></td>
				<td>
					<button>Edit</button>
				</td>
            </tr>
        </tbody>
    </table>
	<div th:if="${#lists.isEmpty(tickets)}"}>There was no tickets assigned to this Technition</div>

    <div id="assignForm"></div>
</div>
</body>
</html>
